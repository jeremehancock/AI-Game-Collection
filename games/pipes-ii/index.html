<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Pipes II</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('pipesIITheme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        [data-theme="light"] {
            --bg-grad-1: #eef2f8;
            --bg-grad-2: #dfe7f3;
            --surface-color: #ffffff;
            --surface-2: #f4f7fb;
            --text-color: #1b2436;
            --muted-color: #65748c;
            --border-color: rgba(20, 30, 60, 0.10);
            --shadow-color: rgba(30, 50, 90, 0.14);
            --accent: #1e88e5;
            --pill-bg: #eef2f8;
            --pill-active: #1e88e5;
        }

        [data-theme="dark"] {
            --bg-grad-1: #0c1024;
            --bg-grad-2: #161b3a;
            --surface-color: #161a30;
            --surface-2: #1d2240;
            --text-color: #eaf0ff;
            --muted-color: #8b97c0;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-color: rgba(0, 0, 0, 0.45);
            --accent: #22d3ee;
            --pill-bg: rgba(255, 255, 255, 0.06);
            --pill-active: #22d3ee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            color: var(--text-color);
            background:
                radial-gradient(circle at 15% 10%, rgba(34, 211, 238, 0.10), transparent 45%),
                radial-gradient(circle at 85% 90%, rgba(124, 92, 255, 0.12), transparent 45%),
                linear-gradient(160deg, var(--bg-grad-1), var(--bg-grad-2));
            background-attachment: fixed;
            transition: color 0.3s;
            overflow-x: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: min(440px, 100%);
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        h1 {
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, var(--accent), #7c5cff 90%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 6px var(--shadow-color);
            transition: transform 0.2s, background 0.3s;
            flex-shrink: 0;
            position: relative;
        }

        .icon-btn:hover { transform: translateY(-2px); }
        .icon-btn:active { transform: scale(0.94); }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-color);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        [data-theme="dark"] .sun-icon { display: block; }
        [data-theme="dark"] .moon-icon { display: none; }
        [data-theme="light"] .sun-icon { display: none; }
        [data-theme="light"] .moon-icon { display: block; }

        .stats {
            width: 100%;
            display: flex;
            gap: 10px;
        }

        .stat {
            flex: 1;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 9px 6px;
            text-align: center;
            box-shadow: 0 3px 10px var(--shadow-color);
        }

        .stat .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted-color);
            font-weight: 600;
        }

        .stat .value {
            font-size: clamp(18px, 5vw, 22px);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            margin-top: 2px;
        }

        .canvas-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
        }

        canvas#gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            box-shadow: 0 10px 30px var(--shadow-color);
            touch-action: manipulation;
        }

        .difficulty {
            display: flex;
            gap: 6px;
            background: var(--pill-bg);
            padding: 5px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
        }

        .pill {
            border: none;
            background: transparent;
            color: var(--muted-color);
            font-weight: 700;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .pill.active {
            background: var(--pill-active);
            color: #fff;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button.action {
            flex: 1;
            padding: 13px 18px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: clamp(14px, 4vw, 16px);
            font-weight: 700;
            box-shadow: 0 4px 14px var(--shadow-color);
            transition: transform 0.15s, filter 0.2s;
        }

        button.action:hover { filter: brightness(1.08); transform: translateY(-1px); }
        button.action:active { transform: scale(0.97); }

        #newGameBtn { background: linear-gradient(135deg, #4CAF50, #2e9e54); }
        #shuffleBtn { background: linear-gradient(135deg, #2196F3, #1769d4); }

        /* Win modal */
        .overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(8, 12, 28, 0.55);
            backdrop-filter: blur(5px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
            z-index: 20;
            padding: 20px;
        }

        .overlay.show { opacity: 1; pointer-events: auto; }

        .modal {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 28px 26px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transform: scale(0.85) translateY(10px);
            transition: transform 0.35s cubic-bezier(0.18, 0.9, 0.3, 1.3);
        }

        .overlay.show .modal { transform: scale(1) translateY(0); }

        .modal .trophy { font-size: 52px; line-height: 1; }

        .modal h2 {
            font-size: 28px;
            margin: 8px 0 2px;
            background: linear-gradient(120deg, var(--accent), #7c5cff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal .sub { color: var(--muted-color); font-size: 14px; margin-bottom: 18px; }

        .modal .result-grid {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .modal .result {
            flex: 1;
            background: var(--surface-2);
            border-radius: 12px;
            padding: 12px 6px;
        }

        .modal .result .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted-color);
            font-weight: 600;
        }

        .modal .result .value {
            font-size: 20px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .best-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .modal button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, #4CAF50, #2e9e54);
            transition: filter 0.2s, transform 0.15s;
        }

        .modal button:hover { filter: brightness(1.08); }
        .modal button:active { transform: scale(0.97); }

        #fxCanvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 15;
        }

        @media (max-width: 400px) {
            .pill { padding: 8px 12px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>Pipes II</h1>
            <div class="header-right">
                <div class="icon-btn" id="soundToggle" title="Toggle sound" aria-label="Toggle sound">
                    <svg class="sound-on" viewBox="0 0 24 24">
                        <polygon points="4 9 4 15 8 15 13 19 13 5 8 9 4 9" fill="currentColor" stroke="none"></polygon>
                        <path d="M16.5 8.5a4 4 0 0 1 0 7"></path>
                        <path d="M19 6a7 7 0 0 1 0 12"></path>
                    </svg>
                    <svg class="sound-off" viewBox="0 0 24 24" style="display:none">
                        <polygon points="4 9 4 15 8 15 13 19 13 5 8 9 4 9" fill="currentColor" stroke="none"></polygon>
                        <line x1="22" y1="9" x2="16" y2="15"></line>
                        <line x1="16" y1="9" x2="22" y2="15"></line>
                    </svg>
                </div>
                <div class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
                    <svg class="sun-icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="4"></circle>
                        <line x1="12" y1="2" x2="12" y2="5"></line>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                        <line x1="2" y1="12" x2="5" y2="12"></line>
                        <line x1="19" y1="12" x2="22" y2="12"></line>
                        <line x1="4.9" y1="4.9" x2="7" y2="7"></line>
                        <line x1="17" y1="17" x2="19.1" y2="19.1"></line>
                        <line x1="4.9" y1="19.1" x2="7" y2="17"></line>
                        <line x1="17" y1="7" x2="19.1" y2="4.9"></line>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat"><div class="label">Time</div><div class="value" id="timeValue">0:00</div></div>
            <div class="stat"><div class="label">Moves</div><div class="value" id="movesValue">0</div></div>
            <div class="stat"><div class="label">Best</div><div class="value" id="bestValue">—</div></div>
        </div>

        <div class="canvas-wrap">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="difficulty" id="difficulty">
            <button class="pill" data-size="5">Easy</button>
            <button class="pill" data-size="6">Medium</button>
            <button class="pill" data-size="7">Hard</button>
        </div>

        <div class="controls">
            <button class="action" id="newGameBtn">New Game</button>
            <button class="action" id="shuffleBtn">Shuffle</button>
        </div>
    </div>

    <canvas id="fxCanvas"></canvas>

    <div class="overlay" id="winOverlay">
        <div class="modal">
            <div class="trophy">🏆</div>
            <h2>Solved!</h2>
            <div class="sub" id="winSub">The flow is connected.</div>
            <div class="best-badge" id="bestBadge" style="display:none">⭐ New Best Time!</div>
            <div class="result-grid">
                <div class="result"><div class="label">Time</div><div class="value" id="winTime">0:00</div></div>
                <div class="result"><div class="label">Moves</div><div class="value" id="winMoves">0</div></div>
            </div>
            <button id="playAgainBtn">Play Again</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: null,
            ctx: null,
            fxCanvas: null,
            fxCtx: null,

            size: 5,
            cellSize: 80,
            dpr: 1,

            grid: [],
            start: { x: 0, y: 2 },
            end: { x: 4, y: 2 },
            connected: new Set(),
            solutionLength: 0,

            moves: 0,
            solved: false,
            startTime: 0,
            elapsed: 0,

            flowPhase: 0,
            lastFrame: 0,
            particles: [],
            celebrating: false,

            soundOn: true,
            audioCtx: null,

            // Pipe types. Directions: 0=up, 1=right, 2=down, 3=left.
            pipes: [
                { type: '│', connects: [0, 2] },
                { type: '─', connects: [1, 3] },
                { type: '└', connects: [0, 1] },
                { type: '┌', connects: [0, 3] },
                { type: '┐', connects: [2, 3] },
                { type: '┘', connects: [1, 2] }
            ],

            colors: {
                light: {
                    grid: 'rgba(20,30,60,0.07)',
                    connectedBg: 'rgba(33,150,243,0.10)',
                    casing: '#8593ab',
                    body: '#c3ccda',
                    hi: '#eef2f8',
                    water: '#1e88e5',
                    waterGlow: 'rgba(33,150,243,0.55)',
                    waterHi: '#9fdcff',
                    source: '#22c55e',
                    sink: '#f59e0b',
                    sinkDone: '#22c55e'
                },
                dark: {
                    grid: 'rgba(255,255,255,0.05)',
                    connectedBg: 'rgba(34,211,238,0.10)',
                    casing: '#2c3656',
                    body: '#5a6b93',
                    hi: '#93a7d4',
                    water: '#22d3ee',
                    waterGlow: 'rgba(34,211,238,0.75)',
                    waterHi: '#c6f7ff',
                    source: '#34d399',
                    sink: '#fbbf24',
                    sinkDone: '#34d399'
                }
            },

            init() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.fxCanvas = document.getElementById('fxCanvas');
                this.fxCtx = this.fxCanvas.getContext('2d');

                this.soundOn = localStorage.getItem('pipesIISound') !== 'off';
                this.updateSoundIcon();

                const savedSize = parseInt(localStorage.getItem('pipesIIDifficulty'), 10);
                if ([5, 6, 7].includes(savedSize)) this.size = savedSize;

                this.resize();
                this.resizeFx();
                window.addEventListener('resize', () => { this.resize(); this.resizeFx(); });

                this.canvas.addEventListener('click', (e) => this.handleClick(e));

                document.getElementById('newGameBtn').onclick = () => this.newGame();
                document.getElementById('shuffleBtn').onclick = () => this.shuffle();
                document.getElementById('themeToggle').onclick = () => this.toggleTheme();
                document.getElementById('soundToggle').onclick = () => this.toggleSound();
                document.getElementById('playAgainBtn').onclick = () => {
                    this.hideWin();
                    this.newGame();
                };

                document.querySelectorAll('.pill').forEach(pill => {
                    pill.onclick = () => {
                        const newSize = parseInt(pill.dataset.size, 10);
                        if (newSize === this.size && this.grid.length) return;
                        this.size = newSize;
                        localStorage.setItem('pipesIIDifficulty', String(newSize));
                        this.syncDifficultyUI();
                        this.resize();
                        this.newGame();
                    };
                });

                this.syncDifficultyUI();
                this.updateBestDisplay();
                this.newGame();

                this.lastFrame = performance.now();
                requestAnimationFrame((t) => this.loop(t));
            },

            /* ---------- Layout ---------- */
            resize() {
                const rect = this.canvas.getBoundingClientRect();
                const cssSize = rect.width || 360;
                this.dpr = Math.min(window.devicePixelRatio || 1, 3);
                this.canvas.width = Math.round(cssSize * this.dpr);
                this.canvas.height = Math.round(cssSize * this.dpr);
                this.cellSize = cssSize / this.size;
            },

            resizeFx() {
                this.dpr = Math.min(window.devicePixelRatio || 1, 3);
                this.fxCanvas.width = Math.round(window.innerWidth * this.dpr);
                this.fxCanvas.height = Math.round(window.innerHeight * this.dpr);
            },

            /* ---------- Board generation (guaranteed solvable) ---------- */
            newGame() {
                const mid = this.size >> 1;
                this.start = { x: 0, y: mid };
                this.end = { x: this.size - 1, y: mid };

                let path;
                let tries = 0;
                do {
                    path = this.findRandomPath(this.start, this.end);
                    tries++;
                } while (path.length < this.size && tries < 20);

                this.solutionLength = path.length;
                this.buildGrid(path);
                this.scrambleRotations(true);

                this.moves = 0;
                this.solved = false;
                this.celebrating = false;
                this.startTime = 0;
                this.elapsed = 0;
                this.updateMoves();
                this.updateTimeDisplay(0);
                this.updateConnections();
            },

            findRandomPath(start, end) {
                const visited = new Set();
                const path = [];
                const k = (p) => p.x + ',' + p.y;
                const dirs = [{ dx: 0, dy: -1 }, { dx: 1, dy: 0 }, { dx: 0, dy: 1 }, { dx: -1, dy: 0 }];

                const dfs = (cell) => {
                    path.push(cell);
                    visited.add(k(cell));
                    if (cell.x === end.x && cell.y === end.y) return true;

                    const order = dirs.slice().sort(() => Math.random() - 0.5);
                    for (const d of order) {
                        const nx = cell.x + d.dx, ny = cell.y + d.dy;
                        if (nx < 0 || ny < 0 || nx >= this.size || ny >= this.size) continue;
                        if (visited.has(nx + ',' + ny)) continue;
                        if (dfs({ x: nx, y: ny })) return true;
                    }
                    path.pop();
                    visited.delete(k(cell));
                    return false;
                };

                dfs(start);
                return path;
            },

            buildGrid(path) {
                // Start with random decoy pipes everywhere.
                this.grid = [];
                for (let y = 0; y < this.size; y++) {
                    const row = [];
                    for (let x = 0; x < this.size; x++) {
                        const p = this.pipes[Math.floor(Math.random() * this.pipes.length)];
                        row.push({ type: p.type, connects: p.connects.slice(), rotation: 0, angle: 0, target: 0 });
                    }
                    this.grid.push(row);
                }

                // Lay solution pipes along the path at rotation 0.
                const onPath = new Set(path.map(p => p.x + ',' + p.y));
                for (let i = 0; i < path.length; i++) {
                    const c = path[i];
                    const required = [];
                    if (i > 0) required.push(this.dirBetween(c, path[i - 1]));
                    if (i < path.length - 1) required.push(this.dirBetween(c, path[i + 1]));
                    // Source/sink get an outward "inlet/outlet" connection toward the board edge.
                    if (i === 0) required.push(3);              // tap enters from the left
                    if (i === path.length - 1) required.push(1); // drain exits to the right

                    const pipe = this.pipeForConnections(required);
                    this.grid[c.y][c.x] = { type: pipe.type, connects: pipe.connects.slice(), rotation: 0, angle: 0, target: 0 };
                }
                this.onPath = onPath;
            },

            dirBetween(from, to) {
                if (to.y < from.y) return 0;
                if (to.x > from.x) return 1;
                if (to.y > from.y) return 2;
                return 3;
            },

            pipeForConnections(conns) {
                const set = Array.from(new Set(conns)).sort((a, b) => a - b).join(',');
                const map = { '0,2': '│', '1,3': '─', '0,1': '└', '0,3': '┌', '2,3': '┐', '1,2': '┘' };
                const type = map[set];
                return this.pipes.find(p => p.type === type);
            },

            scrambleRotations(allowResolve) {
                for (let attempt = 0; attempt < 12; attempt++) {
                    for (let y = 0; y < this.size; y++) {
                        for (let x = 0; x < this.size; x++) {
                            const r = Math.floor(Math.random() * 4);
                            const cell = this.grid[y][x];
                            cell.rotation = r;
                            cell.angle = r * Math.PI / 2;
                            cell.target = r * Math.PI / 2;
                        }
                    }
                    if (!allowResolve) break;
                    if (!this.computeConnected().has(this.end.x + ',' + this.end.y)) break;
                }
            },

            shuffle() {
                if (!this.grid.length) return;
                this.scrambleRotations(true);
                this.moves = 0;
                this.solved = false;
                this.celebrating = false;
                this.startTime = 0;
                this.elapsed = 0;
                this.updateMoves();
                this.updateTimeDisplay(0);
                this.updateConnections();
            },

            /* ---------- Connectivity ---------- */
            getRotatedConnections(cell) {
                return cell.connects.map(d => (d + cell.rotation) % 4);
            },

            computeConnected() {
                const visited = new Set([this.start.x + ',' + this.start.y]);
                const stack = [this.start];
                while (stack.length) {
                    const c = stack.pop();
                    const conns = this.getRotatedConnections(this.grid[c.y][c.x]);
                    for (const dir of conns) {
                        let n, opp;
                        if (dir === 0) { n = { x: c.x, y: c.y - 1 }; opp = 2; }
                        else if (dir === 1) { n = { x: c.x + 1, y: c.y }; opp = 3; }
                        else if (dir === 2) { n = { x: c.x, y: c.y + 1 }; opp = 0; }
                        else { n = { x: c.x - 1, y: c.y }; opp = 1; }

                        if (n.x < 0 || n.y < 0 || n.x >= this.size || n.y >= this.size) continue;
                        const nk = n.x + ',' + n.y;
                        if (visited.has(nk)) continue;
                        const nConns = this.getRotatedConnections(this.grid[n.y][n.x]);
                        if (nConns.includes(opp)) {
                            visited.add(nk);
                            stack.push(n);
                        }
                    }
                }
                return visited;
            },

            updateConnections() {
                this.connected = this.computeConnected();
                return this.connected.has(this.end.x + ',' + this.end.y);
            },

            /* ---------- Input ---------- */
            handleClick(e) {
                if (this.solved) return;
                const rect = this.canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / this.cellSize);
                const y = Math.floor((e.clientY - rect.top) / this.cellSize);
                if (x < 0 || y < 0 || x >= this.size || y >= this.size) return;

                if (!this.startTime) this.startTime = performance.now();

                const cell = this.grid[y][x];
                cell.rotation = (cell.rotation + 1) % 4;
                cell.target += Math.PI / 2;
                this.moves++;
                this.updateMoves();
                this.playRotate();

                const before = this.connected.size;
                const won = this.updateConnections();
                if (!won && this.connected.size > before) this.playConnect(this.connected.size);

                if (won) this.onSolved();
            },

            onSolved() {
                this.solved = true;
                this.celebrating = true;
                this.elapsed = performance.now() - this.startTime;
                this.playWin();
                this.spawnConfetti();

                const isBest = this.saveBest(this.elapsed);
                this.updateBestDisplay();
                setTimeout(() => this.showWin(isBest), 850);
            },

            /* ---------- Animation loop ---------- */
            loop(t) {
                const dt = Math.min((t - this.lastFrame) / 1000, 0.05);
                this.lastFrame = t;

                this.flowPhase += dt * 60;

                // Ease pipe rotations toward target.
                const ease = Math.min(1, dt * 14);
                for (let y = 0; y < this.size; y++) {
                    for (let x = 0; x < this.size; x++) {
                        const cell = this.grid[y][x];
                        if (Math.abs(cell.target - cell.angle) > 0.0005) {
                            cell.angle += (cell.target - cell.angle) * ease;
                        } else {
                            cell.angle = cell.target;
                        }
                    }
                }

                if (this.startTime && !this.solved) {
                    this.updateTimeDisplay(performance.now() - this.startTime);
                }

                this.draw();
                this.updateConfetti(dt);

                requestAnimationFrame((tt) => this.loop(tt));
            },

            /* ---------- Rendering ---------- */
            theme() {
                return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
            },

            draw() {
                const ctx = this.ctx;
                const c = this.colors[this.theme()];
                const cs = this.cellSize;

                ctx.save();
                ctx.scale(this.dpr, this.dpr);
                ctx.clearRect(0, 0, cs * this.size, cs * this.size);

                // Connected cell backgrounds + grid.
                for (let y = 0; y < this.size; y++) {
                    for (let x = 0; x < this.size; x++) {
                        if (this.connected.has(x + ',' + y)) {
                            ctx.fillStyle = c.connectedBg;
                            this.roundRect(ctx, x * cs + 2, y * cs + 2, cs - 4, cs - 4, cs * 0.12);
                            ctx.fill();
                        }
                        ctx.strokeStyle = c.grid;
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x * cs, y * cs, cs, cs);
                    }
                }

                // Pipes.
                for (let y = 0; y < this.size; y++) {
                    for (let x = 0; x < this.size; x++) {
                        this.drawPipe(x, y, c);
                    }
                }

                // Source & sink nodes.
                this.drawNode(this.start.x, this.start.y, 'source', c);
                this.drawNode(this.end.x, this.end.y, 'sink', c);

                ctx.restore();
            },

            buildPipePath(type, r) {
                const p = new Path2D();
                switch (type) {
                    case '│': p.moveTo(0, -r); p.lineTo(0, r); break;
                    case '─': p.moveTo(-r, 0); p.lineTo(r, 0); break;
                    case '└': p.moveTo(0, -r); p.quadraticCurveTo(0, 0, r, 0); break;
                    case '┌': p.moveTo(0, -r); p.quadraticCurveTo(0, 0, -r, 0); break;
                    case '┐': p.moveTo(-r, 0); p.quadraticCurveTo(0, 0, 0, r); break;
                    case '┘': p.moveTo(r, 0); p.quadraticCurveTo(0, 0, 0, r); break;
                }
                return p;
            },

            drawPipe(x, y, c) {
                const ctx = this.ctx;
                const cs = this.cellSize;
                const cell = this.grid[y][x];
                const cx = x * cs + cs / 2;
                const cy = y * cs + cs / 2;
                const r = cs * 0.34;
                const isWet = this.connected.has(x + ',' + y);

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(cell.angle);

                const path = this.buildPipePath(cell.type, r);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // Casing (dark outer tube).
                ctx.strokeStyle = c.casing;
                ctx.lineWidth = cs * 0.21;
                ctx.stroke(path);

                // Body (mid tone).
                ctx.strokeStyle = c.body;
                ctx.lineWidth = cs * 0.135;
                ctx.stroke(path);

                // Gloss highlight.
                ctx.strokeStyle = c.hi;
                ctx.globalAlpha = 0.5;
                ctx.lineWidth = cs * 0.035;
                ctx.stroke(path);
                ctx.globalAlpha = 1;

                // Water fill for connected pipes.
                if (isWet) {
                    ctx.strokeStyle = c.water;
                    ctx.shadowColor = c.waterGlow;
                    ctx.shadowBlur = cs * 0.28;
                    ctx.lineWidth = cs * 0.085;
                    ctx.stroke(path);
                    ctx.shadowBlur = 0;

                    // Flowing highlight (animated dashes).
                    ctx.strokeStyle = c.waterHi;
                    ctx.globalAlpha = 0.9;
                    ctx.lineWidth = cs * 0.04;
                    ctx.setLineDash([cs * 0.1, cs * 0.22]);
                    ctx.lineDashOffset = -this.flowPhase;
                    ctx.stroke(path);
                    ctx.setLineDash([]);
                    ctx.globalAlpha = 1;
                }

                ctx.restore();
            },

            drawNode(x, y, kind, c) {
                const ctx = this.ctx;
                const cs = this.cellSize;
                const cx = x * cs + cs / 2;
                const cy = y * cs + cs / 2;
                const wet = this.connected.has(x + ',' + y);
                const pulse = 1 + 0.08 * Math.sin(this.flowPhase * 0.12);

                let color = kind === 'source' ? c.source : (wet ? c.sinkDone : c.sink);
                const baseR = cs * 0.2;
                const radius = kind === 'sink' && wet ? baseR * pulse : baseR;

                ctx.save();
                ctx.translate(cx, cy);

                // Glow.
                ctx.shadowColor = color;
                ctx.shadowBlur = cs * (wet || kind === 'source' ? 0.35 : 0.2);

                const grad = ctx.createRadialGradient(0, -radius * 0.3, radius * 0.1, 0, 0, radius);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.35, color);
                grad.addColorStop(1, color);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Inner ring.
                ctx.strokeStyle = 'rgba(255,255,255,0.85)';
                ctx.lineWidth = cs * 0.022;
                ctx.beginPath();
                ctx.arc(0, 0, radius * 0.55, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            },

            roundRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.arcTo(x + w, y, x + w, y + h, r);
                ctx.arcTo(x + w, y + h, x, y + h, r);
                ctx.arcTo(x, y + h, x, y, r);
                ctx.arcTo(x, y, x + w, y, r);
                ctx.closePath();
            },

            /* ---------- Confetti ---------- */
            spawnConfetti() {
                const palette = ['#22d3ee', '#7c5cff', '#4CAF50', '#f59e0b', '#ef476f', '#ffd166'];
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight * 0.42;
                for (let i = 0; i < 140; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 4 + Math.random() * 9;
                    this.particles.push({
                        x: cx + (Math.random() - 0.5) * 80,
                        y: cy,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 6,
                        size: 5 + Math.random() * 7,
                        color: palette[Math.floor(Math.random() * palette.length)],
                        rot: Math.random() * Math.PI,
                        vr: (Math.random() - 0.5) * 0.4,
                        life: 1
                    });
                }
            },

            updateConfetti(dt) {
                const ctx = this.fxCtx;
                ctx.save();
                ctx.scale(this.dpr, this.dpr);
                ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

                if (this.particles.length) {
                    for (const p of this.particles) {
                        p.vy += 22 * dt;       // gravity
                        p.vx *= 0.99;
                        p.x += p.vx;
                        p.y += p.vy;
                        p.rot += p.vr;
                        p.life -= dt * 0.4;

                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot);
                        ctx.globalAlpha = Math.max(0, p.life);
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
                        ctx.restore();
                    }
                    this.particles = this.particles.filter(p => p.life > 0 && p.y < window.innerHeight + 40);
                }

                ctx.restore();
            },

            /* ---------- Stats / display ---------- */
            updateMoves() {
                document.getElementById('movesValue').textContent = this.moves;
            },

            updateTimeDisplay(ms) {
                document.getElementById('timeValue').textContent = this.formatTime(ms);
            },

            formatTime(ms) {
                const total = Math.floor(ms / 1000);
                const m = Math.floor(total / 60);
                const s = total % 60;
                return m + ':' + String(s).padStart(2, '0');
            },

            bestKey() {
                return 'pipesIIBest_' + this.size;
            },

            saveBest(ms) {
                const prev = parseInt(localStorage.getItem(this.bestKey()), 10);
                if (isNaN(prev) || ms < prev) {
                    localStorage.setItem(this.bestKey(), String(Math.round(ms)));
                    return true;
                }
                return false;
            },

            updateBestDisplay() {
                const prev = parseInt(localStorage.getItem(this.bestKey()), 10);
                document.getElementById('bestValue').textContent = isNaN(prev) ? '—' : this.formatTime(prev);
            },

            syncDifficultyUI() {
                document.querySelectorAll('.pill').forEach(pill => {
                    pill.classList.toggle('active', parseInt(pill.dataset.size, 10) === this.size);
                });
            },

            /* ---------- Win modal ---------- */
            showWin(isBest) {
                document.getElementById('winTime').textContent = this.formatTime(this.elapsed);
                document.getElementById('winMoves').textContent = this.moves;
                document.getElementById('bestBadge').style.display = isBest ? 'inline-block' : 'none';
                document.getElementById('winSub').textContent =
                    isBest ? 'A brand-new record — nice flow!' : 'The flow is connected.';
                document.getElementById('winOverlay').classList.add('show');
            },

            hideWin() {
                document.getElementById('winOverlay').classList.remove('show');
            },

            /* ---------- Theme & sound ---------- */
            toggleTheme() {
                const html = document.documentElement;
                const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('pipesIITheme', next);
            },

            toggleSound() {
                this.soundOn = !this.soundOn;
                localStorage.setItem('pipesIISound', this.soundOn ? 'on' : 'off');
                this.updateSoundIcon();
                if (this.soundOn) this.playRotate();
            },

            updateSoundIcon() {
                document.querySelector('.sound-on').style.display = this.soundOn ? 'block' : 'none';
                document.querySelector('.sound-off').style.display = this.soundOn ? 'none' : 'block';
            },

            /* ---------- Audio ---------- */
            ensureAudio() {
                if (!this.audioCtx) {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (AC) this.audioCtx = new AC();
                }
                if (this.audioCtx && this.audioCtx.state === 'suspended') this.audioCtx.resume();
                return this.audioCtx;
            },

            tone(freq, dur, type = 'sine', vol = 0.12, delay = 0) {
                if (!this.soundOn) return;
                const ac = this.ensureAudio();
                if (!ac) return;
                const t0 = ac.currentTime + delay;
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, t0);
                gain.gain.setValueAtTime(0, t0);
                gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
                osc.connect(gain).connect(ac.destination);
                osc.start(t0);
                osc.stop(t0 + dur + 0.02);
            },

            playRotate() {
                this.tone(420, 0.08, 'triangle', 0.08);
            },

            playConnect(count) {
                const base = 330;
                const freq = base * Math.pow(2, Math.min(count, 14) / 12);
                this.tone(freq, 0.18, 'sine', 0.1);
            },

            playWin() {
                const notes = [523.25, 659.25, 783.99, 1046.5];
                notes.forEach((f, i) => this.tone(f, 0.32, 'triangle', 0.12, i * 0.11));
            }
        };

        game.init();
    </script>
</body>
</html>
