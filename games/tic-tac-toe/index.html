<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic-Tac-Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --x-color: #5eead4;
            --o-color: #fbbf24;
            --x-glow: rgba(94, 234, 212, 0.55);
            --o-glow: rgba(251, 191, 36, 0.55);
            /* Approx. height of the non-board UI (title, toggles, score,
               status, button, padding, gaps). Used to cap the board so the
               leftover space lands outside the group, not around the board. */
            --chrome: clamp(320px, 44vh, 380px);
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* Fill the viewport exactly so the game fits without scrolling.
               100dvh tracks the dynamic viewport on mobile browsers. */
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            overflow: hidden;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            padding: clamp(10px, 1.8vh, 20px) clamp(12px, 3vw, 24px);
            max-width: 460px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: clamp(6px, 1.1vh, 12px);
        }

        h1 {
            text-align: center;
            font-size: clamp(1.3em, 5vw, 2em);
            font-weight: 800;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
            flex: 0 0 auto;
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.18);
            border-radius: 14px;
            padding: 5px;
            flex: 0 0 auto;
        }

        .mode-btn {
            flex: 1;
            padding: clamp(7px, 1.2vh, 11px);
            font-size: clamp(13px, 3.6vw, 15px);
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.75);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 700;
        }

        .mode-btn.active {
            background: rgba(255, 255, 255, 0.95);
            color: #5a4a8a;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
        }

        .difficulty-selector {
            display: flex;
            gap: 8px;
            flex: 0 0 auto;
        }

        .difficulty-btn {
            flex: 1;
            padding: clamp(6px, 1vh, 9px);
            font-size: clamp(12px, 3.2vw, 14px);
            border: 1.5px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 600;
        }

        .difficulty-btn.active {
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(255, 255, 255, 0.95);
            color: #5a4a8a;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
        }

        .difficulty-selector.hidden {
            display: none;
        }

        .score {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.18);
            border-radius: 14px;
            padding: clamp(5px, 0.9vh, 9px) 6px;
            flex: 0 0 auto;
        }

        .score-item {
            text-align: center;
            flex: 1;
        }

        .score-item.divider {
            border-left: 1px solid rgba(255, 255, 255, 0.18);
            border-right: 1px solid rgba(255, 255, 255, 0.18);
        }

        .score-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.72em, 2.9vw, 0.85em);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .score-value {
            font-weight: 800;
            font-size: clamp(1.3em, 5.5vw, 1.7em);
            margin-top: 2px;
        }

        .score-item.x-score .score-value {
            color: var(--x-color);
        }

        .score-item.o-score .score-value {
            color: var(--o-color);
        }

        .status {
            text-align: center;
            font-size: clamp(1em, 4.2vw, 1.25em);
            font-weight: 700;
            min-height: 1.4em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 0 0 auto;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
            /* Pull the turn indicator tighter to the score above and board below */
            margin-top: -5px;
            margin-bottom: -5px;
        }

        .status .turn-dot {
            width: 0.7em;
            height: 0.7em;
            border-radius: 50%;
            flex: 0 0 auto;
            transition: background 0.25s ease, box-shadow 0.25s ease;
        }

        .status.x-turn .turn-dot {
            background: var(--x-color);
            box-shadow: 0 0 10px var(--x-glow);
        }

        .status.o-turn .turn-dot {
            background: var(--o-color);
            box-shadow: 0 0 10px var(--o-glow);
        }

        .status.ended .turn-dot {
            display: none;
        }

        /* Wrapper holds a square board capped by both the available width and
           the remaining height (100dvh minus the surrounding UI). flex-shrink
           keeps it from overflowing if the estimate is slightly off. Leftover
           vertical space is centered outside the group by the container. */
        .board-wrapper {
            flex: 0 1 auto;
            min-height: 0;
            width: min(100%, calc(100dvh - var(--chrome)));
            max-height: 100%;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            container-type: size;
        }

        .board {
            width: 100cqmin;
            height: 100cqmin;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: clamp(6px, 2.4cqmin, 12px);
        }

        .cell {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: clamp(10px, 5cqmin, 18px);
            font-size: clamp(1.8rem, 18cqmin, 4.6rem);
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            line-height: 1;
        }

        .cell:hover:not(.x):not(.o) {
            background: rgba(255, 255, 255, 0.18);
        }

        .cell:active {
            transform: scale(0.94);
        }

        .cell.x,
        .cell.o {
            cursor: default;
        }

        .cell.x {
            color: var(--x-color);
            text-shadow: 0 0 14px var(--x-glow);
        }

        .cell.o {
            color: var(--o-color);
            text-shadow: 0 0 14px var(--o-glow);
        }

        /* Pop-in animation when a mark is placed */
        .cell .mark {
            display: inline-block;
            animation: pop-in 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes pop-in {
            0% {
                transform: scale(0.2);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .cell.winner {
            background: rgba(255, 255, 255, 0.95);
            border-color: #fff;
            animation: winnerPulse 0.6s ease-in-out;
        }

        .cell.winner.x {
            color: #0d9488;
            text-shadow: none;
        }

        .cell.winner.o {
            color: #d97706;
            text-shadow: none;
        }

        @keyframes winnerPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.12);
                box-shadow: 0 0 24px rgba(255, 255, 255, 0.7);
            }
        }

        .reset-btn {
            padding: clamp(10px, 1.4vh, 13px);
            font-size: clamp(15px, 4vw, 17px);
            background: rgba(255, 255, 255, 0.95);
            color: #5a4a8a;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            letter-spacing: 0.3px;
            transition: transform 0.1s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.22);
            align-self: stretch;
            flex: 0 0 auto;
            /* Pull the button tighter to the board above */
            margin-top: -5px;
        }

        .reset-btn:hover {
            background: #fff;
        }

        .reset-btn:active {
            transform: translateY(1px) scale(0.99);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>

        <div class="mode-selector">
            <button class="mode-btn active" id="aiMode">vs AI</button>
            <button class="mode-btn" id="playerMode">vs Player</button>
        </div>

        <div class="difficulty-selector" id="difficultySelector">
            <button class="difficulty-btn" id="easyBtn">Easy</button>
            <button class="difficulty-btn" id="mediumBtn">Medium</button>
            <button class="difficulty-btn active" id="hardBtn">Hard</button>
        </div>

        <div class="score">
            <div class="score-item x-score">
                <div class="score-label">X Wins</div>
                <div class="score-value" id="xScore">0</div>
            </div>
            <div class="score-item divider">
                <div class="score-label">Draws</div>
                <div class="score-value" id="drawScore">0</div>
            </div>
            <div class="score-item o-score">
                <div class="score-label">O Wins</div>
                <div class="score-value" id="oScore">0</div>
            </div>
        </div>

        <div class="status x-turn" id="status">
            <span class="turn-dot"></span>
            <span id="statusText">X's Turn</span>
        </div>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>

        <button class="reset-btn" id="resetBtn">New Game</button>
    </div>

    <script>
        const board = document.getElementById('board');
        const status = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const resetBtn = document.getElementById('resetBtn');
        const aiModeBtn = document.getElementById('aiMode');
        const playerModeBtn = document.getElementById('playerMode');
        const xScoreEl = document.getElementById('xScore');
        const oScoreEl = document.getElementById('oScore');
        const drawScoreEl = document.getElementById('drawScore');
        const difficultySelector = document.getElementById('difficultySelector');
        const easyBtn = document.getElementById('easyBtn');
        const mediumBtn = document.getElementById('mediumBtn');
        const hardBtn = document.getElementById('hardBtn');

        let currentPlayer = 'X';
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let isAIMode = true;
        let difficulty = 'hard';
        let scores = { X: 0, O: 0, draw: 0 };

        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
            [0, 4, 8], [2, 4, 6] // diagonals
        ];

        function setStatus(text, turn) {
            statusText.textContent = text;
            status.classList.remove('x-turn', 'o-turn', 'ended');
            if (turn === 'X') {
                status.classList.add('x-turn');
            } else if (turn === 'O') {
                status.classList.add('o-turn');
            } else {
                status.classList.add('ended');
            }
        }

        function initBoard() {
            board.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                board.appendChild(cell);
            }
        }

        function handleCellClick(e) {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            const index = cell.dataset.index;

            if (gameBoard[index] !== '' || !gameActive) return;
            if (isAIMode && currentPlayer === 'O') return;

            makeMove(index, currentPlayer);

            if (gameActive && isAIMode && currentPlayer === 'O') {
                setStatus('AI is thinking…', 'O');
                setTimeout(makeAIMove, 350);
            }
        }

        function makeMove(index, player) {
            gameBoard[index] = player;
            const cell = board.children[index];
            cell.innerHTML = `<span class="mark">${player}</span>`;
            cell.classList.add(player.toLowerCase());

            if (checkWinner(player)) {
                gameActive = false;
                setStatus(`${player} Wins! 🎉`, null);
                scores[player]++;
                updateScores();
                highlightWinningCells(player);
                return;
            }

            if (gameBoard.every(cell => cell !== '')) {
                gameActive = false;
                setStatus("It's a Draw!", null);
                scores.draw++;
                updateScores();
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            setStatus(`${currentPlayer}'s Turn`, currentPlayer);
        }

        function checkWinner(player) {
            return winPatterns.some(pattern =>
                pattern.every(index => gameBoard[index] === player)
            );
        }

        function highlightWinningCells(player) {
            const winPattern = winPatterns.find(pattern =>
                pattern.every(index => gameBoard[index] === player)
            );
            if (winPattern) {
                winPattern.forEach(index => {
                    board.children[index].classList.add('winner');
                });
            }
        }

        function makeAIMove() {
            if (!gameActive) return;

            let moveIndex;

            if (difficulty === 'easy') {
                // Easy: Always blocks wins, 50% chance to take winning move, otherwise random
                moveIndex = checkWinningMove('O'); // Try to win
                if (moveIndex === null || Math.random() < 0.5) {
                    moveIndex = checkWinningMove('X'); // Block player win
                }
                if (moveIndex === null) {
                    moveIndex = getRandomMove(); // Random move
                }
            } else if (difficulty === 'medium') {
                // Medium: Always blocks and wins, 85% smart play, 15% random
                if (Math.random() < 0.15) {
                    moveIndex = getRandomMove();
                } else {
                    moveIndex = minimax(gameBoard, 'O').index;
                }
            } else {
                // Hard: Always perfect play
                moveIndex = minimax(gameBoard, 'O').index;
            }

            makeMove(moveIndex, 'O');
        }

        function checkWinningMove(player) {
            for (let pattern of winPatterns) {
                const [a, b, c] = pattern;
                const cells = [gameBoard[a], gameBoard[b], gameBoard[c]];

                // Check if two cells have the player and one is empty
                if (cells.filter(cell => cell === player).length === 2 &&
                    cells.filter(cell => cell === '').length === 1) {
                    // Return the empty cell index
                    if (gameBoard[a] === '') return a;
                    if (gameBoard[b] === '') return b;
                    if (gameBoard[c] === '') return c;
                }
            }
            return null;
        }

        function getRandomMove() {
            const availableSpots = gameBoard.reduce((acc, cell, idx) => {
                if (cell === '') acc.push(idx);
                return acc;
            }, []);
            return availableSpots[Math.floor(Math.random() * availableSpots.length)];
        }

        function minimax(board, player) {
            const availableSpots = board.reduce((acc, cell, idx) => {
                if (cell === '') acc.push(idx);
                return acc;
            }, []);

            if (checkWinner('X')) return { score: -10 };
            if (checkWinner('O')) return { score: 10 };
            if (availableSpots.length === 0) return { score: 0 };

            const moves = [];

            for (let i = 0; i < availableSpots.length; i++) {
                const move = {};
                move.index = availableSpots[i];
                board[availableSpots[i]] = player;

                if (player === 'O') {
                    const result = minimax(board, 'X');
                    move.score = result.score;
                } else {
                    const result = minimax(board, 'O');
                    move.score = result.score;
                }

                board[availableSpots[i]] = '';
                moves.push(move);
            }

            let bestMove;
            if (player === 'O') {
                let bestScore = -Infinity;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            }

            return moves[bestMove];
        }

        function resetGame() {
            currentPlayer = 'X';
            gameBoard = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            setStatus("X's Turn", 'X');
            initBoard();
        }

        function updateScores() {
            xScoreEl.textContent = scores.X;
            oScoreEl.textContent = scores.O;
            drawScoreEl.textContent = scores.draw;
        }

        aiModeBtn.addEventListener('click', () => {
            isAIMode = true;
            aiModeBtn.classList.add('active');
            playerModeBtn.classList.remove('active');
            difficultySelector.classList.remove('hidden');
            resetGame();
        });

        playerModeBtn.addEventListener('click', () => {
            isAIMode = false;
            playerModeBtn.classList.add('active');
            aiModeBtn.classList.remove('active');
            difficultySelector.classList.add('hidden');
            resetGame();
        });

        easyBtn.addEventListener('click', () => {
            difficulty = 'easy';
            easyBtn.classList.add('active');
            mediumBtn.classList.remove('active');
            hardBtn.classList.remove('active');
            resetGame();
        });

        mediumBtn.addEventListener('click', () => {
            difficulty = 'medium';
            mediumBtn.classList.add('active');
            easyBtn.classList.remove('active');
            hardBtn.classList.remove('active');
            resetGame();
        });

        hardBtn.addEventListener('click', () => {
            difficulty = 'hard';
            hardBtn.classList.add('active');
            easyBtn.classList.remove('active');
            mediumBtn.classList.remove('active');
            resetGame();
        });

        resetBtn.addEventListener('click', resetGame);

        initBoard();
    </script>
</body>

</html>
